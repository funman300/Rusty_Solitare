<svg xmlns="http://www.w3.org/2000/svg" width="256" height="384" viewBox="0 0 256 384">
  <rect x="2" y="2" width="252" height="380" rx="14" ry="14"
        fill="#FAFAF8" stroke="#AAAAAA" stroke-width="1.5"/>

  <!-- Top-left corner: rank label + small suit -->
